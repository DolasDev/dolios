services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hermes
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 5s
      timeout: 5s
      retries: 10

  hermes:
    build: ./services/hermes
    restart: unless-stopped
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL_NAME: ${MODEL_NAME}
      DATABASE_URL: postgresql+asyncpg://hermes:${POSTGRES_PASSWORD}@db:5432/hermes
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  chat-ui:
    build: ./services/chat-ui
    restart: unless-stopped
    environment:
      HERMES_URL: http://hermes:8000
    depends_on:
      - hermes
    ports:
      - "8001:8000"

volumes:
  pgdata:
