# Host stack: Postgres only.
#
# `hermes-agent` runs natively on the host (see README), and the LLM lives on
# the dolo-llm machine via compose.dolo-llm.yml. Postgres is here for future
# state — agent memory, MCP tool servers, etc. — and starts empty.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hermes
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
