# autonomous-coder — hermes-agent profile config (TEMPLATE, no secrets).
#
# Materialized into ~/.hermes/profiles/autonomous-coder/config.yaml by
# `make employee ROLE=autonomous-coder`. Secrets live in that profile's .env
# (see env.example), never here.
#
# This employee is the *supervisor*: the local model decides and dispatches;
# Claude Code does the engineering. See SOUL.md and MODEL_OPTIONS.md.

model:
  # Local qwen3.6 on dolo-llm — cheap, always-on supervisor (see MODEL_OPTIONS.md).
  # Phase 1 may switch this to / add OpenRouter for heavier reasoning.
  default: "qwen3.6:35b-a3b"
  provider: "custom"
  base_url: "http://dolo-llm:11434/v1"
  api_key: "ollama"          # any non-empty string; Ollama ignores it
  context_length: 65536      # 64Ki: meets hermes-agent's 64K floor; capped well
                             # below the model's 262K (KV cache cost) per MODEL_OPTIONS.
                             # Must match OLLAMA_CONTEXT_LENGTH in compose.dolo-llm.yml.
  # Resilience: if dolo-llm is unreachable, fall back to the same model family
  # (just bigger) on OpenRouter, so failover doesn't change how the agent acts.
  # Requires OPENROUTER_API_KEY in this profile's .env (see env.example).
  # Verified OpenRouter slug: qwen/qwen3-235b-a22b-2507 (tools=True, 262K ctx).
  # hermes namespaces it with the `openrouter/` prefix per its config docs —
  # confirm the prefix on the host during the Phase 1 smoke test.
  fallback_providers:
    - provider: "openrouter"
      model: "openrouter/qwen/qwen3-235b-a22b-2507"

agent:
  max_turns: 90
  tool_use_enforcement: "auto"
  reasoning_effort: "medium"

# Guardrail: require human approval rather than acting unattended until the
# Phase 3 guardrails (branch+PR, allowlist, budget) are in place.
approvals:
  mode: "manual"

terminal:
  backend: "local"
  timeout: 180

# The supervisor loop. The guardrailed dispatcher (services/coder/dispatch.py)
# enforces gate + allowlist + branch + budget + PR-not-merge in code; this loop
# only has the model PICK a task and call it. Left COMMENTED until host
# validation (needs hermes + claude + gh) and token-refresh land — see
# services/coder/README.md and ROADMAP Phase 3.
# cron:
#   coder_loop:
#     schedule: "*/30 * * * *"   # every 30 min
#     prompt: >
#       Pick one small backlog task from an allowlisted repo, then run
#       `python3 services/coder/dispatch.py --repo <name> --task <id>
#       --instructions "<what to do>"`. The dispatcher will refuse if the
#       capacity gate holds, the repo isn't allowlisted, or the budget is spent.
#       Report the resulting PR url or the refusal reason.
