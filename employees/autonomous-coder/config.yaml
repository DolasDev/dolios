# autonomous-coder — hermes-agent profile config (TEMPLATE, no secrets).
#
# Materialized into ~/.hermes/profiles/autonomous-coder/config.yaml by
# `make employee ROLE=autonomous-coder`. Secrets live in that profile's .env
# (see env.example), never here.
#
# This employee is the *supervisor*: the local model decides and dispatches;
# Claude Code does the engineering. See SOUL.md and MODEL_OPTIONS.md.

model:
  # Local qwen3.6 on dolo-llm — cheap, always-on supervisor (see MODEL_OPTIONS.md).
  default: "qwen3.6:35b-a3b"
  provider: "custom"
  base_url: "http://dolo-llm:11434/v1"
  api_key: "ollama"          # any non-empty string; Ollama ignores it
  context_length: 65536      # 64Ki: meets hermes-agent's 64K floor; capped well
                             # below the model's 262K (KV cache cost) per MODEL_OPTIONS.
                             # Must match OLLAMA_CONTEXT_LENGTH in compose.dolo-llm.yml.
  # No fallback_providers by design. Fleet policy is $0 marginal API spend —
  # subscription-only for Claude Code, local model only for the supervisor.
  # OpenRouter is metered and outside the subscription, so any failover there
  # would directly violate that policy. If dolo-llm is unreachable, the
  # supervisor halts cleanly until it returns — that's not urgent work.

agent:
  max_turns: 90
  tool_use_enforcement: "auto"
  reasoning_effort: "medium"

# Guardrail: require human approval rather than acting unattended until the
# Phase 3 guardrails (branch+PR, allowlist, budget) are in place.
approvals:
  # Flipped from "manual" to "auto" on 2026-06-01 after chunks 1+2 of the CI
  # proposal landed cleanly via the host-driven dispatch. The cron loop's
  # safety still rests on the layered controls below the supervisor model:
  # gate pacing, chunk-mode dispatcher guardrails (allowlist, branch off main,
  # PR-not-merge, deterministic branch + gh idempotency, atomic box flip),
  # and the human review on each opened PR. The supervisor itself only
  # invokes tick.py per the cron prompt — no shell composition.
  mode: "auto"

terminal:
  backend: "local"
  timeout: 180

# The nightly catch-up loop. The dispatcher (services/coder/dispatch.py) enforces
# gate + allowlist + branch + PR-not-merge in code; the supervisor just picks a
# task per tick. Left COMMENTED until token-refresh + an allowlisted repo land
# (HOST_BRINGUP step 5) — see services/coder/README.md.
#
# Schedule: every 30 min from 03:00 to 11:30 UTC — a ~9-hour overnight burst
# window (roughly 10pm EST → 6am EST). Each tick is a single dispatch; the
# schedule itself provides the persistent catch-up across the 5h-window refill
# (model A: we don't run a long-lived burst process, the cron does the looping).
# The pacing math (linear weekly target = t·100%) lives in coder.yaml's
# `gate.windows`; the dispatcher's preflight returns `binding_headroom_pct` so
# the supervisor knows when it's at-pace and should exit early.
cron:
  coder_loop:
    schedule: "0,30 3-11 * * *"
    prompt: >
      Run `python3 /opt/data/repos/dolios/services/coder/tick.py` from
      `/opt/data/repos/dolios`. The script is the deterministic orchestrator:
      gate preflight → backlog.py → switch on kind → invoke the right worker
      (auditor / dispatcher). It writes one JSON record to stdout and
      appends one row to `.dolios/tick-log.jsonl`.

      Read the JSON it printed. Briefly report:
        - the `kind` (audit / execute / remeasure / propose / empty / hold)
        - the `rationale`
        - if `kind == execute`: the `pr_url` and `cost_usd`
        - if `kind == hold`: the `gate_reason` and `binding_window`
        - if any `*_error` field is set: the error verbatim

      Do NOT run any other commands. Do NOT modify the repo or any config.
      The schedule fires again in 30 minutes — persistent catch-up across
      5h-window refills is the schedule's job, not yours. One tick per fire.
