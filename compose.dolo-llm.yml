# Deployed to the dolo-llm machine (RTX 3060 12GB) on the LAN.
# Run from this directory on dolo-llm:
#   docker compose -f compose.dolo-llm.yml up -d
#
# Requires the NVIDIA Container Toolkit on the host:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/
services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    # Bind-mounted to the host's native ~/.ollama store (where the model was
    # first pulled) so the ~23GB qwen3.6 download is reused, not duplicated.
    # gpu-stack.sh clears any stray native `ollama serve` before this starts,
    # so the two never contend for the store or the port. ${HOME} must resolve
    # to the user who pulled the model — run `make`/the script as that user,
    # not via sudo.
    volumes:
      - ${HOME}/.ollama:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
      OLLAMA_HOST: 0.0.0.0:11434
      # Serve a 64Ki window. Ollama's default is only 4096, which would silently
      # truncate prompts regardless of what a client requests; hermes-agent also
      # refuses any model under a 64K window. Must match `context_length` in the
      # employee config.yaml files. KV cache grows with this (~96KiB/token →
      # ~6.4GB at 64Ki); 48GB system RAM absorbs the spill. See MODEL_OPTIONS.md.
      OLLAMA_CONTEXT_LENGTH: "65536"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot: pulls every model listed in infra/ollama/models.txt, then exits.
  # Re-runs are cheap (ollama pull is idempotent on already-present models).
  model-puller:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ./infra/ollama/models.txt:/models.txt:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        while IFS= read -r model || [ -n "$$model" ]; do
          case "$$model" in
            ''|\#*) continue ;;
          esac
          echo ">> pulling $$model"
          ollama pull "$$model"
        done < /models.txt
        echo ">> all models pulled"
    restart: "no"
